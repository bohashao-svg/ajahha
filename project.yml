name: RunningHub
options:
  bundleIdPrefix: com.runninghub
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: 15.0
    TARGETED_DEVICE_FAMILY: 1
    PRODUCT_BUNDLE_IDENTIFIER: com.runninghub.ios
    PRODUCT_NAME: RunningHub
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
    ENABLE_BITCODE: NO

targets:
  RunningHub:
    type: application
    platform: iOS
    sources:
      - path: RunningHub
        excludes:
          - "**/*.md"
    info:
      path: RunningHub/Info.plist
      properties:
        CFBundleDisplayName: RunningHub
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSPhotoLibraryAddUsageDescription: "需要访问相册以保存图片"
        NSPhotoLibraryUsageDescription: "需要访问相册以保存图片"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        INFOPLIST_FILE: RunningHub/Info.plist

name: RunningHub
options:
  bundleIdPrefix: com.runninghub
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: 16.0
    TARGETED_DEVICE_FAMILY: 1
    PRODUCT_BUNDLE_IDENTIFIER: com.runninghub.ios
    PRODUCT_NAME: 人民万岁
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    ENABLE_BITCODE: NO

targets:
  RunningHub:
    type: application
    platform: iOS
    sources:
      - path: RunningHub
        excludes:
          - "**/*.md"
          - "Libraries/XLActionController/Info.plist"
          - "Libraries/XLActionController/*.h"
    info:
      path: RunningHub/Info.plist
      properties:
        CFBundleDisplayName: 人民万岁
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSPhotoLibraryAddUsageDescription: "需要访问相册以保存图片"
        NSPhotoLibraryUsageDescription: "需要访问相册以保存图片"
        NSCameraUsageDescription: "需要访问相机以拍摄照片"
        NSMicrophoneUsageDescription: "需要访问麦克风以录制视频"
        NSLocationWhenInUseUsageDescription: "需要访问位置以标记照片"
        CFBundleIconName: AppIcon
        CFBundleIcons:
          CFBundlePrimaryIcon:
            CFBundleIconFiles:
              - AppIcon
            CFBundleIconName: AppIcon
            UIPrerenderedIcon: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        INFOPLIST_FILE: RunningHub/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES

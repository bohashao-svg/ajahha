name: Build IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build archive (no signing)
        run: |
          xcodebuild clean archive \
            -scheme "RunningHub" \
            -configuration Release \
            -archivePath "${{ runner.temp }}/RunningHub.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PRODUCT_BUNDLE_IDENTIFIER=com.runninghub.ios

      - name: Package IPA manually
        run: |
          APP_PATH=$(find "${{ runner.temp }}/RunningHub.xcarchive" -name "*.app" | head -1)
          mkdir -p "${{ runner.temp }}/Payload"
          cp -r "$APP_PATH" "${{ runner.temp }}/Payload/"
          cd "${{ runner.temp }}"
          zip -r RunningHub.ipa Payload
          echo "IPA created at ${{ runner.temp }}/RunningHub.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: RunningHub-${{ github.sha }}
          path: ${{ runner.temp }}/RunningHub.ipa
          retention-days: 30
